name: NestMate CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # CI: Static Analysis & Tests
  # ─────────────────────────────────────────
  ci:
    name: CI — Lint, Test & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Django Tests ──
      - name: Run Django Tests
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DEBUG: "True"
        run: |
          python manage.py test --verbosity=2
        continue-on-error: true

      # ── SonarQube Scan ──
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=sowmyahakkandi-hue_nestmate-app
            -Dsonar.organization=sowmyahakkandi-hue
            -Dsonar.sources=.
            -Dsonar.exclusions=**/migrations/**,**/venv/**,**/__pycache__/**
            -Dsonar.python.version=3.11

  # ─────────────────────────────────────────
  # CD: Deploy to EC2 (main branch only)
  # ─────────────────────────────────────────
  cd:
    name: CD — Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH and deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/nestmate-app
            git pull origin main
            source ~/venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            sudo systemctl restart gunicorn
            sudo systemctl status gunicorn
