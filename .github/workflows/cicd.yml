name: NestMate CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: nestmate-app
  EB_APPLICATION_NAME: nestmate-accommodation
  EB_ENVIRONMENT_NAME: nestmate-accommodation-prod

jobs:
  # ─────────────────────────────────────────
  # CI: Static Analysis & Tests
  # ─────────────────────────────────────────
  ci:
    name: CI — Lint, Test & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit flake8 coverage

      # ── Static Code Analysis: Flake8 ──
      - name: Flake8 — Style & Syntax Check
        run: |
          flake8 . --count --max-line-length=120 --exclude=migrations,venv --statistics
        continue-on-error: false

      # ── Security Vulnerability Analysis: Bandit ──
      - name: Bandit — Security Vulnerability Scan
        run: |
          bandit -r . -x ./venv,./migrations -f json -o bandit-report.json || true
          bandit -r . -x ./venv,./migrations --severity-level medium
        continue-on-error: false

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

      # ── SonarQube Analysis ──
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=nestmate-accommodation
            -Dsonar.projectName=NestMate Accommodation Finder
            -Dsonar.sources=.
            -Dsonar.exclusions=**/migrations/**,**/venv/**,**/__pycache__/**
            -Dsonar.python.version=3.11

      # ── Django Tests ──
      - name: Run Django Tests
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DEBUG: "True"
        run: |
          python manage.py test --verbosity=2

      - name: Generate Coverage Report
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci
          DEBUG: "True"
        run: |
          coverage run --source='.' manage.py test
          coverage report
          coverage xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────
  # CD: Build, Push & Deploy (main branch only)
  # ─────────────────────────────────────────
  cd:
    name: CD — Build, Push to ECR & Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Configure AWS Credentials ──
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Login to Amazon ECR ──
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & Push Docker Image to ECR ──
      - name: Build, tag and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Create Elastic Beanstalk Deployment Package ──
      - name: Generate Elastic Beanstalk deployment package
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cat > Dockerrun.aws.json << EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": 8000,
                "HostPort": 80
              }
            ]
          }
          EOF
          zip -r deploy.zip Dockerrun.aws.json

      # ── Run DB Migrations on AWS ──
      - name: Run Django Migrations
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          DB_SECRET_NAME: ${{ secrets.DB_SECRET_NAME }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          echo "Migrations will run via Elastic Beanstalk container commands"

      # ── Deploy to Elastic Beanstalk ──
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ env.EB_APPLICATION_NAME }}
          environment_name: ${{ env.EB_ENVIRONMENT_NAME }}
          version_label: nestmate-${{ github.sha }}
          region: ${{ env.AWS_REGION }}
          deployment_package: deploy.zip
          wait_for_deployment: true

      # ── Notify Deployment Success ──
      - name: Deployment Summary
        run: |
          echo "✅ Deployment successful!"
          echo "Image: ${{ steps.build-image.outputs.image }}"
          echo "Version: nestmate-${{ github.sha }}"
