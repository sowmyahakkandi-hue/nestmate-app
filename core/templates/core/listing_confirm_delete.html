{% extends 'base.html' %}
{% block title %}Delete Listing — NestMate{% endblock %}
{% block content %}
<div style="max-width:480px;margin:4rem auto;text-align:center;">
    <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:0.5rem;">Delete Listing?</h1>
    <p style="color:var(--text-muted);margin-bottom:1.5rem;">Are you sure you want to delete <strong style="color:var(--text);">{{ listing.title }}</strong>? This action cannot be undone.</p>
    <div class="card">
        <form method="post" style="display:flex;gap:0.75rem;justify-content:center;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'listing_detail' listing.pk %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
